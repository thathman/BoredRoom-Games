name: Release signed games

on:
  push:
    tags: ['v*.*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build and sign artifacts
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          BOREDROOM_GAMES_SIGNING_KEY: ${{ secrets.BOREDROOM_GAMES_SIGNING_KEY }}
        run: npm run build
      - name: Verify catalog
        run: npm test
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.tgz --title "${GITHUB_REF_NAME}" --generate-notes
